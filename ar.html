<!-- ไฟล์ ar.html -->
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
        }

        model-viewer {
            width: 100%;
            height: 100vh;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .anim-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* ปุ่มสำหรับเปิด AR โดยเฉพาะ */
        #custom-ar-button {
            background-color: #ff4757;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        #custom-ar-button:active {
            transform: scale(0.95);
        }

        .anim-buttons button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <audio id="sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9f8c.mp3"></audio>

    <model-viewer id="viewer"
        src="https://github.com/KhronosGroup/glTF-Sample-Models/raw/master/2.0/Fox/glTF-Binary/Fox.glb" ar
        ar-modes="webxr scene-viewer quick-look" camera-controls autoplay animation-name="Idle" shadow-intensity="1"
        exposure="1">

        <!-- แทรกปุ่ม Custom AR ตรงนี้ -->
        <button slot="ar-button" id="custom-ar-button">
            ✨ ส่อง AR ในพื้นที่จริง
        </button>

    </model-viewer>

    <div class="controls">
        <div class="anim-buttons">
            <button onclick="playAnim('Idle')">Idle</button>
            <button onclick="playAnim('Walk')">Walk</button>
            <button onclick="playAnim('Run')">Run</button>
        </div>
    </div>

    <script>
        const viewer = document.getElementById("viewer");
        const sound = document.getElementById("sound");

        function playAnim(name) {
            viewer.animationName = name;
            sound.currentTime = 0;
            sound.play().catch(() => { });
        }
    </script>

</body>

</html>
