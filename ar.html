<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
        }

        model-viewer {
            width: 100%;
            height: 100vh;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- 🔊 SOUND -->
    <audio id="sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b9f8c.mp3"></audio>

    <!-- 🦊 MODEL -->
    <model-viewer id="viewer"
        src="https://github.com/KhronosGroup/glTF-Sample-Models/raw/master/2.0/Fox/glTF-Binary/Fox.glb" ar
        ar-modes="webxr scene-viewer quick-look" camera-controls autoplay animation-name="Idle" shadow-intensity="1"
        exposure="1">
    </model-viewer>

    <div class="controls">
        <button onclick="playAnim('Idle')">Idle</button>
        <button onclick="playAnim('Walk')">Walk</button>
        <button onclick="playAnim('Run')">Run</button>
    </div>

    <script>
        const viewer = document.getElementById("viewer");
        const sound = document.getElementById("sound");

        function playAnim(name) {
            viewer.animationName = name;

            // เล่นเสียง (ต้องกดปุ่ม → ใช้ได้ทุกเครื่อง)
            sound.currentTime = 0;
            sound.play().catch(() => { });
        }
    </script>

</body>

</html>
