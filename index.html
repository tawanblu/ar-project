<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Unlock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            padding: 40px;
        }

        #distance {
            margin: 20px 0;
            font-weight: bold;
            font-size: 22px;
            color: #333;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: #ccc;
            color: white;
            cursor: not-allowed;
            transition: 0.3s;
        }

        button.active {
            background: #007bff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>

<body>

    <h1>📍 AR Mission</h1>
    <p>กรุณาเดินทางไปยังจุดหมายในระยะ 1,000 เมตร</p>

    <div id="distance">🛰️ กำลังค้นหาสัญญาณ GPS...</div>

    <div id="arArea">
        <button id="mainBtn" onclick="openAR()" disabled>🚀 ปุ่ม AR ยังไม่พร้อม</button>
    </div>

    <script>
        const targetLat = 12.659111;
        const targetLng = 99.864299;
        const radius = 1000;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                const d = getDistance(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    targetLat,
                    targetLng
                );

                const distText = document.getElementById("distance");
                const btn = document.getElementById("mainBtn");

                distText.innerHTML = "📏 ระยะห่าง: " + d.toFixed(0) + " เมตร";

                if (d <= radius) {
                    btn.disabled = false;
                    btn.classList.add("active");
                    btn.innerHTML = "🚀 เปิด AR ได้เลย!";
                    distText.style.color = "#28a745";
                } else {
                    btn.disabled = true;
                    btn.classList.remove("active");
                    btn.innerHTML = "🚀 ห่างอีก " + (d - radius).toFixed(0) + " ม. ถึงจะเปิดได้";
                    distText.style.color = "#dc3545";
                }
            }, err => {
                document.getElementById("distance").innerHTML = "❌ โปรดอนุญาต GPS และรีเฟรชหน้าเว็บ";
            }, { enableHighAccuracy: true });
        }

        function openAR() {
            window.location.href = "ar.html";
        }
    </script>
</body>

</html>
