<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Unlock</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 40px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: #007bff;
            color: white;
        }

        #arButton {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>📍 AR Mission</h1>
    <p>เดินเข้าใกล้เพื่อปลดล็อก AR</p>

    <div id="distance">กำลังโหลด...</div>

    <div id="arButton">
        <button onclick="openAR()">🚀 เปิด AR</button>
    </div>

    <script>
        const targetLat = 12.659111;
        const targetLng = 99.864299;
        const radius = 2000;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        navigator.geolocation.watchPosition(pos => {
            const d = getDistance(
                pos.coords.latitude,
                pos.coords.longitude,
                targetLat,
                targetLng
            );

            document.getElementById("distance").innerHTML =
                "📏 ระยะ: " + d.toFixed(0) + " เมตร";

            if (d <= radius) {
                document.getElementById("arButton").style.display = "block";
            }
        });

        function openAR() {
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isIOS) {
                alert("iPhone จะเปิด AR แบบ Quick Look (บาง animation อาจไม่แสดง)");
            }
            window.location.href = "ar.html";
        }
    </script>

</body>

</html>
